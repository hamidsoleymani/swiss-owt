<h2>Boats</h2>

<button (click)="createBoat()">
  Create Boat
</button>

<button (click)="logout()">
  Logout
</button>
<br><br>

<table border="1">

  <thead>

  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Description</th>
    <th>Created</th>
    <th>Actions</th>
  </tr>

  </thead>

  <tbody>

    @for (boat of boats; track boat.id) {

      <tr>

        <td>{{ boat.id }}</td>
        <td>{{ boat.name }}</td>
        <td>{{ boat.description }}</td>
        <td>{{ boat.createdAt }}</td>

        <td>

          <button (click)="editBoat(boat.id!)">
            Edit
          </button>

          <button (click)="deleteBoat(boat.id!)">
            Delete
          </button>

        </td>

      </tr>

    } @empty {

      <tr>
        <td colspan="5">
          No boats found.
        </td>
      </tr>

    }

  </tbody>

</table>

<br>

<button
  (click)="previousPage()"
  [disabled]="page === 0">
  Previous
</button>

&nbsp;

Page {{ page + 1 }} of {{ totalPages }}

&nbsp;

<button
  (click)="nextPage()"
  [disabled]="page >= totalPages - 1">
  Next
</button>

<br><br>

Total boats: {{ totalElements }}
