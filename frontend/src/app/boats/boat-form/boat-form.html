<h2>
  {{ boat.id ? 'Edit Boat' : 'Create Boat' }}
</h2>

<div>

  <label for="name">Name</label>

  <br>

  <input
    id="name"
    name="name"
    type="text"
    [(ngModel)]="boat.name"
    required>

</div>

<br>

<div>

  <label for="description">Description</label>

  <br>

  <textarea
    id="description"
    name="description"
    rows="5"
    [(ngModel)]="boat.description">
  </textarea>

</div>

<br>

<button (click)="save()">
  Save
</button>

<button (click)="cancel()">
  Cancel
</button>
