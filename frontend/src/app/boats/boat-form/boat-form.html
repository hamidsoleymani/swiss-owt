<h2>
  {{ boat.id ? 'Edit Boat' : 'Create Boat' }}
</h2>
<div>

  <label>Name</label>

  <br>

  <input
    name="name"
    type="text"
    [(ngModel)]="boat.name">

</div>

<br>

<div>

  <label>Description</label>

  <br>

  <textarea
    name="description"
    rows="5"
    [(ngModel)]="boat.description">
  </textarea>

</div>

<br>

<button (click)="save()">
  Save
</button>

<button (click)="cancel()">
  Cancel
</button>
