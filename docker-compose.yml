services:

  postgres:

    image: postgres:17

    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: swiss_owt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swiss_owt"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - swiss-owt-network

  backend:

    build:
      context: ./backend

    container_name: backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "9090:9090"

    networks:
      - swiss-owt-network

  frontend:

    build:
      context: ./frontend

    container_name: frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

    networks:
      - swiss-owt-network

volumes:

  postgres_data:

networks:

  swiss-owt-network: